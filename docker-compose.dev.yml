# Local development infrastructure only — the apps run natively for hot reload.
# Usage: make infra / make infra-down (requires Docker).
services:
  postgres:
    # PostGIS-enabled Postgres 16: the product is map-heavy, so geospatial
    # support is available from day one.
    image: postgis/postgis:16-3.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-najda}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-najda}
      POSTGRES_DB: ${POSTGRES_DB:-najda}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - najda-postgres-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - najda-redis-dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  najda-postgres-dev:
  najda-redis-dev:
